name: aether-account-cloud

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: aether-account-cloud:latest
    container_name: aether-account-cloud
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://aether:password@postgres:5432/aether_account
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SERVER_PORT=8080
      - CORS_ALLOWED_ORIGINS=https://account.skygenesisenterprise.com
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: aether-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=aether
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=aether_account
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether_account"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
