services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: aether-account-dev:latest
    container_name: aether-account-dev
    restart: unless-stopped
    ports:
      - "3000:3000" # Next.js
      - "8080:8080" # Go backend API
    environment:
      NODE_ENV: development
      ENVIRONMENT: local
      DATABASE_URL: postgresql://aether:password@localhost:5432/aether_account
      JWT_SECRET: dev-secret-change-in-production
      SERVER_PORT: 8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_ENVIRONMENT: local
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./app/src:/app/app/src
      - ./app/public:/app/app/public
      - ./app/package.json:/app/app/package.json
      - ./app/package-lock.json:/app/app/package-lock.json
      - ./app/pnpm-lock.yaml:/app/app/pnpm-lock.yaml
      - ./app/next.config.ts:/app/app/next.config.ts
      - ./app/tsconfig.json:/app/app/tsconfig.json
      - ./server:/app/server
      - ./.air.toml:/app/.air.toml
      - ./.env:/app/.env
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
    working_dir: /app
    command: sh -c "mkdir -p /app/app/src/logs /app/tmp && cd /app/app && pnpm dev & cd /app && air -c .air.toml"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
